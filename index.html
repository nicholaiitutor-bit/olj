
<!DOCTYPE html>
<html>
<head>
  <title>Remote Work Hub</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= HOME PAGE ================= -->
<div id="homePage">

  <div class="hero">
    <h1>💼 Remote Work Hub</h1>
    <p>Hire talent or find remote jobs worldwide</p>

    <button onclick="openAuth('login')">Login</button>
    <button onclick="openAuth('register')">Sign Up</button>
  </div>

</div>

<!-- ================= AUTH MODAL ================= -->
<div id="authModal" class="modal" style="display:none;">

  <div class="modal-box">

    <h2 id="authTitle">Login</h2>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <select id="role">
      <option value="jobseeker">Job Seeker</option>
      <option value="employer">Employer</option>
    </select>

    <button onclick="register()" id="registerBtn">Register</button>
    <button onclick="login()" id="loginBtn">Login</button>

    <button onclick="closeAuth()">Close</button>

  </div>

</div>

<!-- ================= APP ================= -->
<div id="app" style="display:none;">

  <!-- TOP BAR -->
  <div id="topBar">
    <span>Logged in as: <b id="userEmail"></b></span>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <button onclick="showView('jobs')">Jobs</button>
      <button onclick="showView('post')">Post Job</button>
      <button onclick="showView('dashboard')">Dashboard</button>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

      <!-- JOB LIST -->
      <div id="view-jobs">
        <h2>Available Jobs</h2>
        <div id="jobList"></div>
      </div>

      <!-- POST JOB -->
      <div id="view-post" style="display:none;">
        <h2>Post Job</h2>

        <input id="title" placeholder="Job Title">
        <input id="company" placeholder="Company">
        <input id="salary" placeholder="Salary">
        <textarea id="description" placeholder="Description"></textarea>

        <button onclick="postJob()">Post</button>
      </div>

      <!-- DASHBOARD -->
      <div id="view-dashboard" style="display:none;">
        <h2>My Jobs</h2>
        <div id="myJobs"></div>
      </div>

    </div>

  </div>

</div>

<!-- CHAT -->
<div id="chatBox" style="display:none;">
  <h3>Chat</h3>
  <div id="chatMessages"></div>
  <input id="chatInput">
  <button onclick="sendMessage()">Send</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="app.js"></script>

</body>
</html>
