<!DOCTYPE html>
<html>
<head>
  <title>OLJ Clone - Remote Work Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>💼 Remote Work Hub (Advanced OLJ Clone)</h1>

<!-- ================= LOGIN ================= -->
<div id="authSection">
  <h2>Login / Register</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <select id="role">
    <option value="jobseeker">Job Seeker</option>
    <option value="employer">Employer</option>
  </select>

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<hr>

<!-- ================= USER ================= -->
<div id="userSection" style="display:none;">
  <p>Logged in as: <span id="userEmail"></span></p>
  <button onclick="logout()">Logout</button>
</div>

<hr>

<!-- ================= POST JOB (EMPLOYER ONLY) ================= -->
<div id="jobForm" style="display:none;">
  <h2>Post a Job (Employer Dashboard)</h2>

  <input id="title" placeholder="Job Title">
  <input id="company" placeholder="Company">
  <input id="salary" placeholder="Salary">
  <textarea id="description" placeholder="Job Description"></textarea>

  <button onclick="postJob()">Post Job</button>
</div>

<hr>

<!-- ================= JOB LIST ================= -->
<h2>Available Jobs</h2>
<div id="jobList"></div>

<!-- ================= APPLY SECTION ================= -->
<div id="applyBox" style="display:none;">
  <h2>Apply to Job</h2>
  <textarea id="applyMessage" placeholder="Write your application message"></textarea>
  <button onclick="submitApplication()">Submit Application</button>
</div>

<!-- ================= FIREBASE ================= -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="app.js"></script>

</body>
</html>
