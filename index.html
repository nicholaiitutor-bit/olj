
<!DOCTYPE html>
<html>
<head>
  <title>Remote Work Hub</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>💼 Remote Work Hub</h1>

<!-- ================= AUTH ================= -->
<div id="authSection">
  <h2>Login / Register</h2>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <select id="role">
    <option value="jobseeker">Job Seeker</option>
    <option value="employer">Employer</option>
  </select>

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- ================= USER ================= -->
<div id="userSection" style="display:none;">
  <p>Logged in as: <span id="userEmail"></span></p>
  <button onclick="logout()">Logout</button>
</div>

<hr>

<!-- ================= EMPLOYER DASHBOARD ================= -->
<div id="employerDashboard" style="display:none;">

  <h2>Employer Dashboard</h2>

  <button onclick="showTab('dashboard')">Dashboard</button>
  <button onclick="showTab('jobs')">My Jobs</button>
  <button onclick="showTab('post')">Post Job</button>

  <!-- DASHBOARD -->
  <div id="tab-dashboard">
    <h3>Overview</h3>
    <p>Manage your hiring here.</p>
  </div>

  <!-- MY JOBS -->
  <div id="tab-jobs" style="display:none;">
    <h3>My Jobs</h3>
    <div id="myJobs"></div>
  </div>

  <!-- POST JOB -->
  <div id="tab-post" style="display:none;">
    <h3>Post Job</h3>

    <input id="title" placeholder="Job Title">
    <input id="company" placeholder="Company">
    <input id="salary" placeholder="Salary">
    <textarea id="description" placeholder="Description"></textarea>

    <button onclick="postJob()">Post Job</button>
  </div>

</div>

<hr>

<!-- ================= JOB LIST (JOBSEEKER VIEW) ================= -->
<div id="jobListWrapper">
  <h2>Available Jobs</h2>
  <div id="jobList"></div>
</div>

<!-- ================= APPLY BOX ================= -->
<div id="applyBox" style="display:none;">
  <h3>Apply to Job</h3>
  <textarea id="applyMessage" placeholder="Message"></textarea>
  <button onclick="submitApplication()">Send Application</button>
</div>

<!-- ================= FIREBASE ================= -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="app.js"></script>

</body>
</html>
